services:
  twitch-bot:
    image: ghcr.io/jwsoat/twitch-bot:latest
    restart: unless-stopped
    volumes:
      - bot_data:/data
    environment:
      - TWITCH_TOKEN
      - TWITCH_BOT_NICK
      - HA_URL
      - HA_TOKEN
      - CHANNELS
      - ALLOWED_USERS
      - TTS_SERVICE
      - TTS_ENTITY
      - TTS_COOLDOWN_SEC
      - ENTITY_REFRESH_SEC
      - COMMAND_PREFIX
      - LOG_LEVEL
      - DB_PATH=/data/bot_data.db

  dashboard:
    image: ghcr.io/jwsoat/twitch-bot-dashboard:latest
    restart: unless-stopped
    volumes:
      - bot_data:/data
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/data/bot_data.db
      - DASHBOARD_USER
      - DASHBOARD_PASSWORD

  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 twitch-bot dashboard

volumes:
  bot_data:
